# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    session:
        cookie_secure: auto
        cookie_httponly: true
        cookie_samesite: strict

    rate_limiter:
        two_per_minute:
            policy: 'fixed_window'
            limit: 2
            interval: '1 minute'
        five_per_hour:
            policy: 'fixed_window'
            limit: 5
            interval: '1 hour'
        registration:
            policy: 'compound'
            limiters: [two_per_minute, five_per_hour]

    #esi: true
    #fragments: true

when@desktop:
    framework:
        rate_limiter:
            # A desktop app runs locally for a single user: every request comes
            # from 127.0.0.1, so IP-based rate limiting can only ever block the
            # legitimate user (e.g. a form error followed by a resubmit).
            # Standard practice for local desktop apps: disable it.
            registration:
                policy: 'no_limit'

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
